services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://myhome:myhome123@db:5432/myhome
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: myhome
    volumes:
      - uploads:/app/public/uploads
    entrypoint: ["/app/docker-entrypoint.sh"]
    restart: unless-stopped

  db:
    image: postgres:16
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: myhome
      POSTGRES_USER: myhome
      POSTGRES_PASSWORD: myhome123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myhome"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
